- shell:
    - [./os-check.sh, Checking OS requirement]
    - command: 'brew bundle'
      description: Homebrew bundle
      stdout: true
    - command: 'zsh <(curl -s https://raw.githubusercontent.com/zap-zsh/zap/master/install.zsh) --branch release-v1'
      description: Installing zap
      stdout: true
    - command: 'dart pub global activate fvm'
      description: Installing fvm
      stdout: true
    - command: 'yes | fvm global stable'
      description: Install flutter stable
      stdout: true
    - command: 'dart pub global activate flutter_gen'
      description: Installing flutter_gen
      stdout: true

- defaults:
    link:
      relink: true

- clean: ['~']

- create:
    - ~/.config
    - ~/.zshconfig
    - ~/.n

- link:
    ~/.zshrc:
      path: zshrc
      force: true
    ~/.config/zsh:
      path: zsh
      force: true
    ~/.p10k.zsh:
      path: p10k.zsh
      force: true
    ~/.config/nvim:
      glob: true
      path: nvim
    ~/.tmux.conf:
      path: tmux.conf
      force: true


- shell:
    - command: 'git submodule update --init --recursive'
      description: Installing submodules
      stdout: true
    - command: 'rm -rf ~/.local/share/nvim/'
      description: Removing local/share/nvim
      stdout: true
