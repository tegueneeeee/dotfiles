---

- shell:
    - [./os-check.sh, Checking OS requirement]
    - command: 'brew bundle'
      description: Homebrew bundle
      stdout: true
    - command: 'zsh <(curl -s https://raw.githubusercontent.com/zap-zsh/zap/master/install.zsh) --branch release-v1'
      description: Installing zap
      stdout: true

- defaults:
    link:
      relink: true

- clean: ['~']

- create:
    - ~/.config
    - ~/.zshconfig
    - ~/.n

- link:
    ~/.zshrc:
      path: zshrc
      force: true
    ~/.config/zsh:
      path: zsh
      force: true
    ~/.config/yabai:
      path: yabai
      force: true
    ~/.config/skhd:
      path: skhd
      force: true
    ~/.p10k.zsh:
      path: p10k.zsh
      force: true
    ~/.config/nvim:
      glob: true
      path: nvim


- shell:
    - command: 'git submodule update --init --recursive'
      description: Installing submodules
      stdout: true

    
