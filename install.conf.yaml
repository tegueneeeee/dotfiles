---

- shell:
    - command: 'brew bundle'
      description: Homebrew bundle
      stdout: true
    - command: 'zsh <(curl -s https://raw.githubusercontent.com/zap-zsh/zap/master/install.zsh) --branch release-v1'
      description: Installing zap
      stdout: true
    - command: "LV_BRANCH='release-1.3/neovim-0.9' bash <(curl -s https://raw.githubusercontent.com/LunarVim/LunarVim/release-1.3/neovim-0.9/utils/installer/install.sh"
      description: Install LunarVim
      stdout: true

- defaults:
    link:
      relink: true

- clean: ['~']

- create:
    - ~/.config
    - ~/.zshconfig
    - ~/.n

- link:
    ~/.zshrc:
      path: zshrc
      force: true
    ~/.config/zsh:
      path: zsh
      force: true
    ~/.p10k.zsh:
      path: p10k.zsh
      force: true


- shell:
    - command: 'git submodule update --init --recursive'
      description: Installing submodules
      stdout: true
