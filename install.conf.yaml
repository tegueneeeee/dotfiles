- shell:
    - [./os-check.sh, Checking OS requirement]

- defaults:
    link:
      relink: true

- clean: ['~']

- create:
    - ~/.config
    - ~/.zshconfig
    - ~/.n

- link:
    ~/.zshrc:
      path: zshrc
      force: true
    ~/.config/bat:
      path: bat
      force: true
    ~/.config/nvim:
      glob: true
      path: nvim
    ~/.tmux.conf:
      path: tmux.conf
      force: true
    ~/.config/starship.toml:
      path: starship.toml
      force: true
    ~/.zshconfig/plugins:
      glob: true
      create: true
      force: true
      path: zshplugins/*


- shell:
    - command: 'git submodule update --init --recursive'
      description: Installing submodules
      stdout: true
    - command: '[ ! -e ~/.zshconfig/antigen ] && git clone https://github.com/zsh-users/antigen.git ~/.zshconfig/antigen || true'
      description: Installing antigen
      stdout: true
    - command: 'rustup-init -y'
      description: Init rustup
      stdout: true
    - command: 'n lts'
      description: Installing node lts
      stdout: true